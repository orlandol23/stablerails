# Profiles: default = local dev loops; ci = every PR; intense = nightly.
[profile.default]
src = "src"
test = "test"
out = "out"
libs = ["lib"]
solc_version = "0.8.30"
optimizer = true
optimizer_runs = 200

[profile.default.fuzz]
runs = 256

[profile.default.invariant]
runs = 128
depth = 64

[profile.ci.fuzz]
runs = 1000

[profile.ci.invariant]
runs = 1000
depth = 100

[profile.intense.fuzz]
runs = 10000

[profile.intense.invariant]
runs = 5000
depth = 200

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
