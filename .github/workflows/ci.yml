# Honest pipeline policy (inherited from AI-DLH): no `continue-on-error`
# on anything that gates a merge, no `|| true`, informational steps are
# labeled as such. If it's green, it passed.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js:
    name: Lint / typecheck / test / build (pnpm + turbo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version comes from "packageManager" in package.json

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint, typecheck, test, build
        run: pnpm turbo run lint typecheck test build

  contracts:
    name: Foundry (fmt / build / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1

      - name: Check formatting
        run: forge fmt --check

      - name: Build
        run: forge build

      - name: Test (ci profile — fuzz 1000 runs)
        run: forge test -vvv
        env:
          FOUNDRY_PROFILE: ci

  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
